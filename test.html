<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Text Effect</title>
    <style>


        .text-bottom {
            position: absolute;
            font-size: 50px;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 900;
            top: 2px;
            left: 3px;
            text-shadow: 1px 2px 0px rgb(55, 231, 181);
            color: white; /* Color for the bottom text */
        }
    </style>
</head>
<body style=" background-color: #6670cc;">

        <span class="text-bottom">mubsir</span>

</body>
</html>
